<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Vardagskoll 🧡</title>
<meta name="description" content="Barnschema, mat, aktiviteter och städ – allt på ett ställe.">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
  :root{
    --bg:#faf6f0;
    --card:#ffffff;
    --ink:#3b342e;
    --muted:#8d8378;
    --line:#eee5d8;
    --accent:#e8590c;
    --accent-dark:#c94a08;
    --accent-soft:#ffe9db;
    --custody:#fff1c2;
    --custody-line:#f0d98a;
    --green:#2f9e44;
    --green-soft:#e3f5e6;
    --alert:#fff6d6;
    --alert-line:#f2df9e;
    --radius:16px;
    --nav-h:64px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:16px; line-height:1.45;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 16px);
  }
  main{max-width:720px; margin:0 auto; padding:14px 14px 0;}
  header.top{
    max-width:720px; margin:0 auto; padding:16px 16px 4px;
    display:flex; align-items:baseline; justify-content:space-between; gap:8px; flex-wrap:wrap;
  }
  header.top h1{font-size:22px; margin:0; letter-spacing:.2px;}
  header.top .today-line{color:var(--muted); font-size:14px; font-weight:600;}

  section.view{display:none;}
  section.view.active{display:block; animation:fadein .15s ease;}
  @keyframes fadein{from{opacity:.4; transform:translateY(3px);} to{opacity:1; transform:none;}}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(90,70,40,.05);
  }
  .card h2{margin:0 0 10px; font-size:16px;}
  .card h2 .sub{color:var(--muted); font-weight:600; font-size:13px;}
  .muted{color:var(--muted);}
  .small{font-size:13px;}
  .center{text-align:center;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--accent); color:#fff; border:none; border-radius:12px;
    padding:10px 16px; font-size:15px; font-weight:700; cursor:pointer;
    min-height:42px; font-family:inherit;
  }
  .btn:active{background:var(--accent-dark);}
  .btn.ghost{background:#fff; color:var(--accent); border:2px solid var(--accent-soft);}
  .btn.ghost:active{background:var(--accent-soft);}
  .btn.small{min-height:34px; padding:6px 12px; font-size:13.5px; border-radius:10px;}
  .btn.subtle{background:#f4ede3; color:var(--ink);}
  .btn.subtle:active{background:#eadfce;}
  .btn.danger{background:#fdeaea; color:#c0392b;}
  .btn.full{width:100%;}

  input[type=text], select{
    font-family:inherit; font-size:15px; color:var(--ink);
    border:2px solid var(--line); border-radius:12px; padding:10px 12px;
    background:#fff; min-height:42px; width:100%;
  }
  input[type=text]:focus, select:focus{outline:none; border-color:var(--accent);}
  .inline-form{display:flex; gap:8px; margin-top:10px;}
  .inline-form input{flex:1; min-width:0;}
  .inline-form .btn{flex-shrink:0;}

  /* badges & pills */
  .badge{
    display:inline-flex; align-items:center; gap:6px;
    border-radius:999px; padding:4px 12px; font-size:13.5px; font-weight:700;
  }
  .badge.custody{background:var(--custody); border:1px solid var(--custody-line);}
  .badge.free{background:#e9e4f7; border:1px solid #d4cbee;}
  .chip{
    display:inline-flex; align-items:center; justify-content:center;
    border-radius:999px; padding:6px 14px; font-size:14px; font-weight:700;
    background:#f4ede3; color:var(--ink); border:2px solid transparent; cursor:pointer;
    font-family:inherit;
  }
  .chip.on{background:var(--accent-soft); border-color:var(--accent); color:var(--accent-dark);}
  .chip.day{width:40px; height:40px; padding:0;}

  /* reminders */
  .reminder{
    display:flex; gap:10px; align-items:flex-start;
    background:var(--alert); border:1px solid var(--alert-line); border-radius:12px;
    padding:10px 12px; margin-bottom:8px; font-weight:600; font-size:14.5px;
  }
  .reminder .ic{font-size:20px; line-height:1.2;}

  /* checklist */
  .task{
    display:flex; align-items:center; gap:10px; padding:10px 4px;
    border-bottom:1px solid var(--line); font-size:15px;
  }
  .task:last-child{border-bottom:none;}
  .task input[type=checkbox]{width:22px; height:22px; accent-color:var(--green); flex-shrink:0; cursor:pointer;}
  .task.done .txt{text-decoration:line-through; color:var(--muted);}
  .task .txt{flex:1;}
  .task .x{background:none; border:none; color:#c0392b; font-size:17px; cursor:pointer; padding:4px 8px;}

  .bar{height:10px; background:#f1e9dc; border-radius:999px; overflow:hidden; margin:8px 0 4px;}
  .bar .fill{height:100%; background:var(--green); border-radius:999px; transition:width .3s ease;}

  /* städschema: redigeringsläge */
  .task-edit{display:flex; align-items:center; gap:6px; padding:4px 0;}
  .task-edit input[type=text]{flex:1; min-width:0; min-height:38px; padding:7px 10px; font-size:14px;}
  .task-edit select{width:auto; min-height:38px; padding:7px 8px; font-size:13.5px; flex-shrink:0;}
  .task-edit .x{background:none; border:none; color:#c0392b; font-size:17px; cursor:pointer; padding:4px 6px; flex-shrink:0;}

  /* elpriser */
  .elpris-bars{ display:flex; align-items:flex-end; gap:2px; height:92px; margin:12px 0 4px; border-bottom:1px solid var(--line); padding-bottom:2px; }
  .elpris-bar-wrap{ flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; position:relative; }
  .elpris-bar-wrap.now .elpris-bar{ outline:2px solid var(--accent); outline-offset:1px; }
  .elpris-bar{ width:100%; max-width:11px; border-radius:3px 3px 0 0; background:#ccc; min-height:3px; }
  .elpris-bar.cheap{ background:#2f9e44; }
  .elpris-bar.mid{ background:#f0b429; }
  .elpris-bar.expensive{ background:#e03131; }
  .elpris-hlabel{ font-size:8.5px; color:var(--muted); margin-top:3px; height:11px; line-height:11px; }

  /* calendar */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; gap:8px;}
  .cal-head .title{font-size:17px; font-weight:800; text-transform:capitalize;}
  .cal-nav{display:flex; gap:6px;}
  .cal-grid{display:grid; grid-template-columns:30px repeat(7,1fr); gap:4px;}
  .cal-grid .wd{
    text-align:center; font-size:12px; font-weight:700; color:var(--muted);
    padding:2px 0; text-transform:uppercase; letter-spacing:.4px;
  }
  .cal-grid .wk{
    display:flex; align-items:center; justify-content:center;
    font-size:11.5px; font-weight:700; color:var(--muted);
    background:#f4ede3; border-radius:8px; cursor:pointer; border:none; font-family:inherit;
  }
  .cal-grid .wk:active{background:var(--accent-soft); color:var(--accent-dark);}
  .cell{
    position:relative; min-height:56px; border-radius:10px; border:1.5px solid var(--line);
    background:#fff; padding:4px 5px; cursor:pointer; font-family:inherit; text-align:left;
    display:flex; flex-direction:column; gap:2px;
  }
  .cell .num{font-size:13px; font-weight:700;}
  .cell.out{opacity:.45;}
  .cell.custody{background:var(--custody); border-color:var(--custody-line);}
  .cell.jobbresa{background-image:repeating-linear-gradient(135deg, rgba(15,118,110,.08) 0 6px, transparent 6px 12px); border-color:#0f766e;}
  .cell.today{border-color:var(--accent); border-width:2px;}
  .cell .heart{position:absolute; top:3px; right:5px; font-size:10px;}
  .cell .marks{display:flex; flex-wrap:wrap; gap:3px; align-items:center; margin-top:auto;}
  .cell .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .cell .mk{font-size:10px; line-height:1;}
  .legend{display:flex; flex-wrap:wrap; gap:12px; margin-top:12px; font-size:13px; color:var(--muted);}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .legend .dot{width:9px; height:9px; border-radius:50%; display:inline-block;}

  /* meal & activity cards */
  .sugg-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  @media (max-width:480px){ .sugg-grid{grid-template-columns:1fr;} }
  .sugg{
    border:1px solid var(--line); border-radius:12px; padding:12px; background:#fffdf9;
    display:flex; flex-direction:column; gap:8px;
  }
  .sugg .name{font-weight:800; font-size:15px;}
  .sugg .ing{font-size:12.5px; color:var(--muted);}
  .sugg .adult{font-size:12.5px; color:#8a5a00; background:#fff6e0; border:1px solid #f0e2b8; border-radius:8px; padding:5px 8px;}
  .sugg .tags{display:flex; gap:5px; flex-wrap:wrap;}
  .sugg .tag{font-size:11.5px; font-weight:700; background:#eef3ea; color:#4a7c3f; border-radius:999px; padding:2px 9px;}
  .sugg .row{display:flex; gap:6px; flex-wrap:wrap; margin-top:auto;}
  .sugg .rm{align-self:flex-end; background:none; border:none; color:#c0392b; cursor:pointer; font-size:13px; padding:0; font-family:inherit; font-weight:700;}

  .plan-row{
    display:flex; align-items:center; gap:10px; padding:9px 4px;
    border-bottom:1px solid var(--line); font-size:14.5px;
  }
  .plan-row:last-child{border-bottom:none;}
  .plan-row .d{width:86px; flex-shrink:0; font-weight:700;}
  .plan-row .d .sub{display:block; font-size:11.5px; color:var(--muted); font-weight:600;}
  .plan-row .what{flex:1;}
  .plan-row .heart{flex-shrink:0;}

  /* modal */
  #overlay{
    display:none; position:fixed; inset:0; background:rgba(50,40,25,.45); z-index:50;
    align-items:flex-end; justify-content:center; padding:0;
  }
  #overlay.open{display:flex;}
  #sheet{
    background:var(--bg); border-radius:20px 20px 0 0; width:100%; max-width:720px;
    max-height:88vh; overflow-y:auto; padding:18px 16px calc(20px + env(safe-area-inset-bottom,0px));
    animation:slideup .18s ease;
  }
  @media (min-width:721px){
    #overlay{align-items:center; padding:24px;}
    #sheet{border-radius:20px; max-height:80vh;}
  }
  @keyframes slideup{from{transform:translateY(40px); opacity:.5;} to{transform:none; opacity:1;}}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .sheet-head h3{margin:0; font-size:18px; text-transform:capitalize;}
  .sheet-head .close{background:#f4ede3; border:none; border-radius:50%; width:36px; height:36px; font-size:16px; cursor:pointer;}
  .sheet-sec{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px;}
  .sheet-sec h4{margin:0 0 8px; font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
  .daypick{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .daypick button{
    border:1.5px solid var(--line); background:#fff; border-radius:12px; padding:10px;
    font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; text-align:left;
  }
  .daypick button:active{border-color:var(--accent); background:var(--accent-soft);}
  .daypick button .sub{display:block; font-size:12px; color:var(--muted); font-weight:600;}

  /* toast */
  #toast{
    position:fixed; left:50%; bottom:calc(var(--nav-h) + 22px); transform:translateX(-50%) translateY(20px);
    background:#3b342e; color:#fff; padding:10px 18px; border-radius:999px; font-size:14px; font-weight:700;
    opacity:0; pointer-events:none; transition:all .25s ease; z-index:99; max-width:90%; text-align:center;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* bottom nav */
  nav#tabs{
    position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:#fff; border-top:1px solid var(--line);
    display:flex; justify-content:space-around;
    height:calc(var(--nav-h) + env(safe-area-inset-bottom,0px));
    padding-bottom:env(safe-area-inset-bottom,0px);
    max-width:100%;
  }
  nav#tabs button{
    flex:1; background:none; border:none; cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
    font-size:10.5px; font-weight:700; color:var(--muted); padding:6px 2px;
  }
  nav#tabs button .ic{font-size:21px; line-height:1.2;}
  nav#tabs button.on{color:var(--accent-dark);}

  .empty{color:var(--muted); font-size:14px; padding:6px 2px;}
  .kid-row{display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:12px 0; border-bottom:1px solid var(--line);}
  .kid-row:last-child{border-bottom:none;}
  .kid-dot{width:14px; height:14px; border-radius:50%; flex-shrink:0;}
  .kid-name{font-weight:800; font-size:16px; flex:1;}
  .gympa-days{display:flex; gap:5px; flex-wrap:wrap; width:100%;}
  .filters{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px;}
  .biglink{width:100%; text-align:left; background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer;
    display:flex; justify-content:space-between; align-items:center; color:var(--ink);}
</style>
</head>

<header class="top">

/* ================= State ================= */
const LS_KEY = 'vardagskoll-v1';

function defaultState(){
  return {
    children: [],          /* {id, name, color, gympa:[0..6]} */
    custody: {},           /* {'YYYY-MM-DD': true} */
    customMeals: [],       /* {id, emoji, name, ing:[]} */
    mealPlan: {},          /* {'YYYY-MM-DD': {name, emoji}} */
    shopping: [],          /* {id, text, done} */
    customActivities: [],  /* {id, emoji, name, tags:[]} */
    plannedActivities: {}, /* {'YYYY-MM-DD': [{id, emoji, name}]} */
    cleaningTasks: [],     /* {id, name, day:0..6} */
    cleaningDone: {},      /* {'YYYY-Wnn': {taskId:true}} */
    notified: {},          /* {key: 'YYYY-MM-DD'} */
    elprisCache: {}        /* {'elpris-YYYY-MM-DD-SE4': {fetched, hours:[{startIso, sek}]}} */
  };
}

let state = defaultState();

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const data = JSON.parse(raw);
      state = Object.assign(defaultState(), data);
    } else {
      state.cleaningTasks = DEFAULT_CLEANING.map(t => Object.assign({}, t));
      save();
    }
  }catch(e){
    state = defaultState();
    state.cleaningTasks = DEFAULT_CLEANING.map(t => Object.assign({}, t));
  }
}
function save(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  catch(e){ toast('⚠️ Kunde inte spara – kontrollera lagringsutrymmet'); }
  syncReminderDataToIDB();
  scheduleAssistentSync();
}

/* ================= Gemensamt ================= */
function allMeals(){ return SUGGESTED_MEALS.concat(state.customMeals); }
function getMeal(ref){ return allMeals().find(m => m.id === ref) || null; }
function allActivities(){ return SUGGESTED_ACTIVITIES.concat(state.customActivities); }
function getActivity(ref){ return allActivities().find(a => a.id === ref) || null; }

/* ================= Elpriser (elprisetjustnu.se, zon SE4) ================= */
const ELPRIS_ZONE = 'SE4';
let elprisToday = null;
let elprisTomorrow = null;
let elprisLastAttempt = 0;

function elprisCacheKey(ds){ return 'elpris-' + ds + '-' + ELPRIS_ZONE; }

function elprisFromCache(ds){
  const c = state.elprisCache && state.elprisCache[elprisCacheKey(ds)];
  return c ? c.hours : null;
}

async function fetchElprisDay(ds){
  const cached = elprisFromCache(ds);
  try{
    const [y, m, d] = ds.split('-');
    const url = 'https://www.elprisetjustnu.se/api/v1/prices/' + y + '/' + m + '-' + d + '_' + ELPRIS_ZONE + '.json';
    const res = await fetch(url);
    if(!res.ok) throw new Error('http ' + res.status);
    const data = await res.json();
    const hours = data.map(h => ({ startIso: h.time_start, sek: h.SEK_per_kWh }));
    if(!state.elprisCache) state.elprisCache = {};
    state.elprisCache[elprisCacheKey(ds)] = { fetched: Date.now(), hours: hours };
    const keys = Object.keys(state.elprisCache).sort();
    while(keys.length > 6){ delete state.elprisCache[keys.shift()]; }
    save();
    return hours;
  }catch(e){
    return cached; /* offline eller morgondagens priser inte publicerade ännu */
  }
}

async function loadElpriser(){
  const t = todayDate();
  const todayDs = fmtDate(t);
  const tomorrowDs = fmtDate(addDays(t, 1));

  /* visa cachad data direkt, hämta färskt i bakgrunden */
  if(!elprisToday) elprisToday = elprisFromCache(todayDs);
  if(!elprisTomorrow) elprisTomorrow = elprisFromCache(tomorrowDs);
  if(App.tab === 'stad') renderStad();

  const now = Date.now();
  if(elprisToday && elprisTomorrow && (now - elprisLastAttempt) < 5 * 60 * 1000) return;
  elprisLastAttempt = now;

  const [th, tm] = await Promise.all([fetchElprisDay(todayDs), fetchElprisDay(tomorrowDs)]);
  elprisToday = th;
  elprisTomorrow = tm;
  if(App.tab === 'stad') renderStad();
}

function groupHourRanges(hourIndices){
  const sorted = [...hourIndices].sort((a, b) => a - b);
  const ranges = [];
  let start = null, prev = null;
  for(const h of sorted){
    if(start === null){ start = h; prev = h; continue; }
    if(h === prev + 1){ prev = h; continue; }
    ranges.push([start, prev]); start = h; prev = h;
  }
  if(start !== null) ranges.push([start, prev]);
  return ranges.map(([a, b]) => pad2(a) + ':00–' + pad2(b + 1) + ':00');
}

/* API:et levererar priser i 15-minutersupplösning (Nord Pool-standard sedan 2025),
   så vi slår ihop till klocktimmar för en tydlig "timme för timme"-överblick. */
function aggregateToHourly(slots){
  if(!slots || !slots.length) return null;
  const buckets = new Array(24).fill(null).map(() => []);
  for(const s of slots){
    const hr = new Date(s.startIso).getHours();
    if(hr >= 0 && hr < 24) buckets[hr].push(s.sek);
  }
  return buckets
    .map((arr, hr) => arr.length ? { hour: hr, sek: arr.reduce((a, b) => a + b, 0) / arr.length } : null)
    .filter(Boolean);
}

function renderElprisCard(){
  const dayKey = App.elprisDay === 'tomorrow' ? 'tomorrow' : 'today';
  const rawSlots = dayKey === 'today' ? elprisToday : elprisTomorrow;
  const hourly = aggregateToHourly(rawSlots);
  const t = todayDate();
  const labelDate = dayKey === 'today' ? t : addDays(t, 1);

  let html = '<div class="card"><h2>⚡ Elpriser <span class="sub">zon SE4' +
    (hourly ? ' · ' + humanDate(labelDate) : '') + '</span></h2>';

  html += '<div class="filters">' +
    '<button class="chip ' + (dayKey === 'today' ? 'on' : '') + '" onclick="App.setElprisDay(\'today\')">Idag</button>' +
    '<button class="chip ' + (dayKey === 'tomorrow' ? 'on' : '') + '" onclick="App.setElprisDay(\'tomorrow\')">Imorgon</button>' +
    '</div>';

  if(!hourly || !hourly.length){
    html += dayKey === 'tomorrow'
      ? '<p class="empty">Morgondagens priser brukar publiceras runt kl 13 – kolla igen senare.</p>'
      : '<p class="empty">Kunde inte hämta elpriser just nu (ingen uppkoppling?). Försöker igen automatiskt.</p>';
    html += '</div>';
    return html;
  }

  const n = hourly.length;
  const prices = hourly.map(h => h.sek);
  const maxP = Math.max(...prices, 0.001);
  const rank = new Array(n);
  const byPrice = prices.map((p, i) => ({ p, i })).sort((a, b) => a.p - b.p);
  const cheapCount = Math.max(1, Math.round(n / 3));
  byPrice.forEach((e, idx) => {
    rank[e.i] = idx < cheapCount ? 'cheap' : (idx >= n - cheapCount ? 'expensive' : 'mid');
  });

  const nowH = new Date().getHours();
  const currentIdx = (dayKey === 'today') ? hourly.findIndex(h => h.hour === nowH) : -1;

  let bars = '';
  for(let i = 0; i < n; i++){
    const hr = hourly[i].hour;
    const ore = Math.round(prices[i] * 100);
    const heightPct = maxP > 0 ? Math.max(6, Math.round((prices[i] / maxP) * 100)) : 6;
    bars += '<div class="elpris-bar-wrap' + (i === currentIdx ? ' now' : '') + '" ' +
      'title="' + pad2(hr) + ':00–' + pad2((hr + 1) % 24) + ':00 · ' + ore + ' öre/kWh">' +
      '<div class="elpris-bar ' + rank[i] + '" style="height:' + heightPct + '%"></div>' +
      '<span class="elpris-hlabel">' + (hr % 3 === 0 ? pad2(hr) : '') + '</span>' +
      '</div>';
  }
  html += '<div class="elpris-bars">' + bars + '</div>';

  html += '<div class="legend">' +
    '<span><span class="dot" style="background:#2f9e44"></span>Billigt – bra läge att tvätta/diska</span>' +
    '<span><span class="dot" style="background:#f0b429"></span>Mellan</span>' +
    '<span><span class="dot" style="background:#e03131"></span>Dyrt – undvik om du kan</span>' +
    '</div>';

  const cheapRanges = groupHourRanges(hourly.filter((h, i) => rank[i] === 'cheap').map(h => h.hour)).join(', ');
  const expensiveRanges = groupHourRanges(hourly.filter((h, i) => rank[i] === 'expensive').map(h => h.hour)).join(', ');
  const avgOre = Math.round((prices.reduce((a, b) => a + b, 0) / n) * 100);

  html += '<p class="small" style="margin:10px 0 2px"><b>🟢 Bäst att köra tvätt/disk/tvättmaskin:</b> ' + esc(cheapRanges) + '</p>' +
    '<p class="small muted" style="margin:0 0 2px"><b>🔴 Undvik:</b> ' + esc(expensiveRanges) + '</p>' +
    '<p class="small muted" style="margin:0">Snittpris: ' + avgOre + ' öre/kWh</p>';

  if(dayKey === 'today' && currentIdx >= 0){
    const nowOre = Math.round(prices[currentIdx] * 100);
    const nowCls = rank[currentIdx];
    const nowHr = hourly[currentIdx].hour;
    const nowMsg = nowCls === 'cheap' ? '🟢 Bra läge att köra elkrävande sysslor just nu!' :
      (nowCls === 'expensive' ? '🔴 Dyrt just nu – vänta om du kan.' : '🟡 Helt okej läge just nu.');
    html += '<p class="small" style="margin:10px 0 0; font-weight:800">Just nu (kl ' + pad2(nowHr) + '–' + pad2((nowHr + 1) % 24) + '): ' +
      nowOre + ' öre/kWh — ' + nowMsg + '</p>';
  }

  html += '</div>';
  return html;
}

  /* ---- Dagväljare (planera mat/aktivitet) ---- */

    openDayPicker('📅 Vilken dag vill du äta ' + esc(m.name) + '?');

  planActivity(ref){
    const a = getActivity(ref);
    if(!a) return;
    this._pending = { type: 'act', ref: ref };
    openDayPicker('📅 Vilken dag passar ' + esc(a.name) + '?');
  },
  pickDay(ds){
    const p = this._pending;
    this._pending = null;
    this.closeModal();
    if(!p) return;
    const d = parseDate(ds);
    if(p.type === 'meal'){
      const m = getMeal(p.ref);
      if(m){
        state.mealPlan[ds] = { name: m.name, emoji: m.emoji, adult: m.adult || '' };
        toast(m.emoji + ' ' + m.name + ' planerad ' + shortDate(d));
      }
    } else if(p.type === 'act'){
      const a = getActivity(p.ref);
      if(a){
        if(!state.plannedActivities[ds]) state.plannedActivities[ds] = [];
        state.plannedActivities[ds].push({ id: uid(), emoji: a.emoji, name: a.name });
        toast(a.emoji + ' ' + a.name + ' planerad ' + shortDate(d));
      }
    }
    save(); renderAll();
  },

  mealToList(ref){
    const m = getMeal(ref);
    if(!m) return;
    let added = 0;
    for(const ing of m.ing){
      const exists = state.shopping.some(it => !it.done && it.text.toLowerCase() === ing.toLowerCase());
      if(!exists){ state.shopping.push({ id: uid(), text: ing, done: false }); added++; }
    }
    save(); renderAll();
    toast(added ? '🛒 ' + added + ' varor tillagda i inköpslistan' : '🛒 Allt fanns redan i listan');

    document.getElementById('newActGratis').checked = false;
    save(); renderAll();
    toast('⭐ ' + name + ' tillagd bland förslagen');
  },
  removeCustomActivity(id){
    state.customActivities = state.customActivities.filter(a => a.id !== id);
    save(); renderAll();
  },

  /* ---- Städ ---- */
  cleanToggle(taskId){
    const wk = weekKey(todayDate());
    if(!state.cleaningDone[wk]) state.cleaningDone[wk] = {};
    if(state.cleaningDone[wk][taskId]) delete state.cleaningDone[wk][taskId];
    else state.cleaningDone[wk][taskId] = true;
    /* rensa gamla veckor (behåll 8 senaste nycklarna) */
    const keys = Object.keys(state.cleaningDone).sort();
    while(keys.length > 8){ delete state.cleaningDone[keys.shift()]; }
    save();
    const todayTasks = state.cleaningTasks.filter(t => t.day === wIdx(todayDate()));
    const allDone = todayTasks.length && todayTasks.every(t => state.cleaningDone[wk][t.id]);
    renderAll();
    if(allDone && state.cleaningDone[wk][taskId]) toast('🎉 Dagens städning klar – bra jobbat!');
  },
  cleanEdit(){
    this.cleanEditMode = !this.cleanEditMode;
    renderStad();
  },
  cleanAdd(){
    const nameEl = document.getElementById('newCleanName');
    const dayEl = document.getElementById('newCleanDay');
    const name = (nameEl.value || '').trim();
    if(!name){ toast('Skriv vad som ska göras först'); return; }
    state.cleaningTasks.push({ id: 'ct' + uid(), name: name, day: Number(dayEl.value) });
    nameEl.value = '';
    save(); renderStad(); renderToday();
    toast('🧹 Uppgift tillagd');
  },
  cleanRemove(id){
    state.cleaningTasks = state.cleaningTasks.filter(t => t.id !== id);
    save(); renderStad(); renderToday();
  },
  cleanRename(id, value){
    const t = state.cleaningTasks.find(x => x.id === id);
    const v = (value || '').trim();
    if(!t) return;
    if(!v){ renderStad(); return; } /* tomt namn – återställ fältet */
    t.name = v;
    save(); renderToday();
  },
  cleanMove(id, day){
    const t = state.cleaningTasks.find(x => x.id === id);
    if(!t) return;
    t.day = Number(day);
    save(); renderStad(); renderToday();
    toast('🧹 Flyttad till ' + WDAYS[t.day]);
  },
  cleanAddSuggested(i){
    const name = CLEANING_BANK[i];
    if(!name) return;
    const dayEl = document.getElementById('newCleanDay');
    const day = dayEl ? Number(dayEl.value) : 0;
    state.cleaningTasks.push({ id: 'ct' + uid(), name: name, day: day });
    save(); renderStad(); renderToday();
    toast('🧹 ' + name + ' → ' + WDAYS[day]);
  },
  cleanReset(){
    if(!confirm('Återställa städschemat till standardschemat? Dina egna ändringar försvinner.')) return;
    state.cleaningTasks = DEFAULT_CLEANING.map(t => Object.assign({}, t));
    save(); renderStad(); renderToday();
    toast('🧹 Standardschemat är tillbaka');
  },
  setElprisDay(day){
    this.elprisDay = day;
    renderStad();
    loadElpriser();
  },

  /* ---- Barn & gympa ---- */
  childAdd(){
    const input = document.getElementById('childName');
    const name = (input.value || '').trim();
    if(!name){ toast('Skriv barnets namn först'); return; }
    state.children.push({
      id: 'k' + uid(),
      name: name,
      color: KID_COLORS[state.children.length % KID_COLORS.length],
      gympa: []
    });
    input.value = '';
    save(); renderAll();
    toast('💛 ' + name + ' tillagd');
  },
  childRemove(id){
    const c = state.children.find(x => x.id === id);
    if(!c) return;
    if(!confirm('Ta bort ' + c.name + '?')) return;
    state.children = state.children.filter(x => x.id !== id);
    save(); renderAll();
  },
  childGympa(id, day){
    const c = state.children.find(x => x.id === id);
    if(!c) return;
    if(!c.gympa) c.gympa = [];
    if(c.gympa.includes(day)) c.gympa = c.gympa.filter(d => d !== day);
    else c.gympa.push(day);
    save(); renderAll();
    checkNotifications();
  },

  /* ---- Notiser & data ---- */
  notifRequest(){
    if(!('Notification' in window)){ toast('Notiser stöds inte i den här webbläsaren'); return; }
    Notification.requestPermission().then(p => {
      renderMer();
      if(p === 'granted'){ toast('🔔 Notiser aktiverade'); checkNotifications(); }
      else if(p === 'denied'){ toast('Notiser blockerades av webbläsaren'); }
    });
  },
  exportData(){
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'vardagskoll-backup-' + fmtDate(todayDate()) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('💾 Säkerhetskopia nedladdad');
  },
  importFile(input){
    const file = input.files && input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const data = JSON.parse(reader.result);
        if(typeof data !== 'object' || data === null || !Array.isArray(data.children)) throw new Error('fel format');
        state = Object.assign(defaultState(), data);
        save(); renderAll();
        toast('✅ Data återställd från säkerhetskopia');
      }catch(e){
        toast('⚠️ Kunde inte läsa filen – är det rätt fil?');
      }
      input.value = '';
    };
    reader.readAsText(file);
  },
  resetAll(){
    if(!confirm('Vill du verkligen radera ALL data i appen? Det går inte att ångra.')) return;
    localStorage.removeItem(LS_KEY);
    state = defaultState();
    state.cleaningTasks = DEFAULT_CLEANING.map(t => Object.assign({}, t));
    save(); renderAll();
    toast('Appen är nollställd');
  },

  /* ---- Koppling till Skrivbordet ---- */
  kopplingSave(){
    const el = document.getElementById('kopplingInput');
    const kod = (el.value || '').trim().toUpperCase();
    if(!/^[A-Z2-9]{4}-[A-Z2-9]{4}$/.test(kod)){
      toast('Koden ska se ut som XXXX-XXXX – kopiera den från Profil i Skrivbordet');
      return;
    }
    localStorage.setItem(KOPPLING_KEY, kod);
    kopplingStatus = 'Kopplad – hämtar resor…';
    renderMer();
    syncSkrivbordet(true);
  },
  kopplingRemove(){
    localStorage.removeItem(KOPPLING_KEY);
    localStorage.removeItem(SHARED_EVENTS_KEY);
    kopplingStatus = '';
    renderAll();
    toast('Kopplingen är borttagen');
  },

  /* ---- Koppling till Assistenten ---- */
  assistentSave(){
    const el = document.getElementById('assistentInput');
    const kod = (el.value || '').trim().toUpperCase();
    if(!/^[A-Z2-9]{4}-[A-Z2-9]{4}$/.test(kod)){
      toast('Koden ska se ut som XXXX-XXXX – kopiera assistentkoden från Profil i Skrivbordet');
      return;
    }
    localStorage.setItem(ASSISTENT_KEY, kod);
    assistentStatus = 'Kopplad – skickar upp schemat…';
    renderMer();
    syncAssistentUpp(true);
  },
  assistentRemove(){
    localStorage.removeItem(ASSISTENT_KEY);
    assistentStatus = '';
    renderMer();
    toast('Assistent-kopplingen är borttagen');
  },

  closeModal(){
    document.getElementById('overlay').classList.remove('open');
    this._pending = null;
  }
};

function openModal(html){
  document.getElementById('sheet').innerHTML = html;
  document.getElementById('overlay').classList.add('open');
}
function openDayPicker(title){
  const t = todayDate();
  let btns = '';
  for(let i = 0; i < 14; i++){
    const d = addDays(t, i);
    const ds = fmtDate(d);
    const label = i === 0 ? 'Idag' : (i === 1 ? 'Imorgon' : cap(WDAYS[wIdx(d)]));
    btns += '<button onclick="App.pickDay(\'' + ds + '\')">' +
      (hasKids(ds) ? '💛 ' : '') + label +
      '<span class="sub">' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' · v.' + isoWeekInfo(d).week + '</span></button>';
  }
  openModal(
    '<div class="sheet-head"><h3>' + title + '</h3>' +
    '<button class="close" onclick="App.closeModal()">✕</button></div>' +
    '<p class="muted small" style="margin-top:0">💛 = dagar du har barnen</p>' +
    '<div class="daypick">' + btns + '</div>'
  );
}

/* ================= Render ================= */
function renderAll(){
  /* varje vy ritas för sig — kraschar en får de andra ändå visas,
     så appen aldrig blir helt blank */
  const parts = [renderHeader, renderToday, renderCal, renderMat, renderAkt, renderStad, renderMer];
  let failed = null;
  for(const fn of parts){
    try{ fn(); }
    catch(e){ failed = e; }
  }
  if(failed && !renderAll._warned){
    renderAll._warned = true;
    toast('⚠️ En del av appen kunde inte visas – din data är kvar. Prova att stänga och öppna appen igen.');
  }
}

function renderHeader(){
  const t = todayDate();
  document.getElementById('headerDate').textContent = cap(humanDate(t)) + ' · v.' + isoWeekInfo(t).week;
}

/* ---- Idag ---- */
function renderToday(){
  const t = todayDate();
  const ts = fmtDate(t);
  const tomorrow = addDays(t, 1);
  const custodyToday = hasKids(ts);
  const custodyTomorrow = hasKids(fmtDate(tomorrow));
  let html = '';

  /* Kom igång-hjälp */
  if(!state.children.length){
    html += '<div class="card">' +
      '<h2>👋 Välkommen till Vardagskoll!</h2>' +
      '<p class="small">Appen som hjälper dig hålla koll på vardagen – ett steg i taget.</p>' +
      '<ol class="small" style="padding-left:20px; margin:8px 0;">' +
      '<li>Lägg till dina barn under <b>Mer</b></li>' +
      '<li>Bocka i deras gympadagar så påminner appen dig 1 och 2 dagar innan</li>' +
      '<li>Markera i <b>Kalendern</b> exakt vilka dagar barnen är hos dig</li>' +
      '</ol>' +
      '<button class="btn full" onclick="App.go(\'mer\')">⚙️ Kom igång – lägg till barn</button>' +
      '</div>';
  }

  /* Barnen idag */
  html += '<div class="card">' +
    '<h2>' + (custodyToday ? '💛 Barnen är hos dig idag' : '🤍 Barnfri dag idag') + '</h2>' +
    '<p class="small muted" style="margin:0">Imorgon (' + WDAYS[wIdx(tomorrow)] + '): ' +
    (custodyTomorrow ? 'barnen hos dig 💛' : 'barnfri 🤍') +
    ' &nbsp;·&nbsp; <a href="#" onclick="App.go(\'kal\');return false" style="color:var(--accent);font-weight:700">Ändra i kalendern</a></p>' +
    '</div>';

  /* Jobbresa (från Skrivbordet) */
  const tripToday = sharedEventsOn(ts).some(e => e.type === 'jobbresa');
  const tripTomorrow = sharedEventsOn(fmtDate(tomorrow)).some(e => e.type === 'jobbresa');
  if(tripToday || tripTomorrow){
    html += '<div class="reminder"><span class="ic">🧳</span><span>' +
      (tripToday ? 'Du är på jobbresa idag.' : 'Du är på jobbresa imorgon.') +
      ' <span class="muted" style="font-weight:600">(från Skrivbordet)</span></span></div>';
  }

  /* Påminnelser */
  const rems = gympaReminders(state.children);
  if(rems.length){
    html += '<div class="card"><h2>🔔 Påminnelser</h2>' +
      rems.map(r => '<div class="reminder"><span class="ic">' + (r.off === 0 ? '🤸' : '👟') + '</span><span>' + esc(reminderText(r)) + '</span></div>').join('') +
      '</div>';
  }

  /* Middag idag */
  const meal = state.mealPlan[ts];
  html += '<div class="card"><h2>🍽️ Middag idag</h2>';
  if(meal){
    html += '<p style="font-size:18px; font-weight:800; margin:4px 0 ' + (meal.adult ? '4px' : '10px') + '">' + meal.emoji + ' ' + esc(meal.name) + '</p>' +
      (meal.adult ? '<p class="small muted" style="margin:0 0 10px">🌶️ <b>Vuxenversion:</b> ' + esc(meal.adult) + '</p>' : '') +
      '<button class="btn small subtle" onclick="App.openDay(\'' + ts + '\')">Ändra</button>';
  } else {
    html += '<p class="empty">Ingen middag planerad ännu.</p>' +
      '<div style="display:flex; gap:8px; flex-wrap:wrap">' +
      '<button class="btn small" onclick="App.openDay(\'' + ts + '\')">Välj middag</button>' +
      '<button class="btn small ghost" onclick="App.go(\'mat\')">Bläddra bland förslag</button></div>';
  }
  html += '</div>';

  /* Aktiviteter idag */
  const acts = state.plannedActivities[ts] || [];
  html += '<div class="card"><h2>🎈 Aktiviteter idag</h2>';
  if(acts.length){
    html += acts.map(a => '<div class="task"><span class="txt">' + a.emoji + ' ' + esc(a.name) + '</span>' +
      '<button class="x" title="Ta bort" onclick="App.removeDayActivity(\'' + ts + '\',\'' + a.id + '\')">✕</button></div>').join('');
  } else {
    html += '<p class="empty">Inget planerat.</p>' +
      '<button class="btn small ghost" onclick="App.go(\'akt\')">Hitta något kul</button>';
  }
  html += '</div>';

  /* Städ idag */
  const wk = weekKey(t);
  const doneMap = state.cleaningDone[wk] || {};
  const todayTasks = state.cleaningTasks.filter(x => x.day === wIdx(t));
  html += '<div class="card"><h2>🧹 Städ idag <span class="sub">(' + cap(WDAYS[wIdx(t)]) + ')</span></h2>';
  if(todayTasks.length){
    const doneCount = todayTasks.filter(x => doneMap[x.id]).length;
    html += todayTasks.map(x =>
      '<label class="task ' + (doneMap[x.id] ? 'done' : '') + '">' +
      '<input type="checkbox" ' + (doneMap[x.id] ? 'checked' : '') + ' onchange="App.cleanToggle(\'' + x.id + '\')">' +
      '<span class="txt">' + esc(x.name) + '</span></label>'
    ).join('');
    if(doneCount === todayTasks.length){
      html += '<p class="small" style="color:var(--green); font-weight:800; margin:8px 0 0">🎉 Allt klart för idag!</p>';
    }
  } else {
    html += '<p class="empty">Inga städuppgifter idag – njut! 😌</p>';
  }
  html += '</div>';

  /* Inköpslistan */
  const left = state.shopping.filter(i => !i.done).length;
  html += '<button class="biglink" onclick="App.go(\'mat\')"><span>🛒 Inköpslistan</span>' +
    '<span class="muted">' + (left ? left + ' varor kvar ›' : 'tom ›') + '</span></button>';

  document.getElementById('view-idag').innerHTML = html;
}

/* ---- Kalender ---- */
function renderCal(){
  const y = App.calY, m = App.calM;
  const t = todayDate(); const ts = fmtDate(t);
  const first = new Date(y, m, 1);
  const last = new Date(y, m + 1, 0);
  const start = mondayOf(first);
  const end = addDays(mondayOf(last), 6);

  let grid = '<div class="cal-grid">';
  grid += '<div class="wd">v.</div>';
  for(const wd of WDAYS_SHORT) grid += '<div class="wd">' + wd + '</div>';

  let d = start;
  while(d <= end){
    const w = isoWeekInfo(d).week;
    grid += '<button class="wk" title="Markera/avmarkera hela veckan" onclick="App.toggleWeekCustody(\'' + fmtDate(d) + '\')">' + w + '</button>';
    for(let i = 0; i < 7; i++){
      const ds = fmtDate(d);
      const classes = ['cell'];
      if(d.getMonth() !== m) classes.push('out');
      if(hasKids(ds)) classes.push('custody');
      const onTrip = sharedEventsOn(ds).some(e => e.type === 'jobbresa');
      if(onTrip) classes.push('jobbresa');
      if(ds === ts) classes.push('today');
      let marks = '';
      const wd = wIdx(d);
      for(const c of state.children){
        if(c.gympa && c.gympa.includes(wd)) marks += '<span class="dot" style="background:' + c.color + '" title="' + esc(c.name) + ' har gympa"></span>';
      }
      if(state.mealPlan[ds]) marks += '<span class="mk" title="Middag planerad">🍽️</span>';
      if(state.plannedActivities[ds] && state.plannedActivities[ds].length) marks += '<span class="mk" title="Aktivitet planerad">🎈</span>';
      if(onTrip) marks += '<span class="mk" title="Jobbresa (från Skrivbordet)">🧳</span>';
      grid += '<button class="' + classes.join(' ') + '" onclick="App.openDay(\'' + ds + '\')">' +
        (hasKids(ds) ? '<span class="heart">💛</span>' : '') +
        '<span class="num">' + d.getDate() + '</span>' +
        '<span class="marks">' + marks + '</span></button>';
      d = addDays(d, 1);
    }
  }
  grid += '</div>';

  let legend = '<div class="legend">' +
    '<span>💛 barnen hos dig</span><span>🍽️ middag</span><span>🎈 aktivitet</span><span>🧳 jobbresa (Skrivbordet)</span>';
  for(const c of state.children){
    if(c.gympa && c.gympa.length) legend += '<span><span class="dot" style="background:' + c.color + '"></span>' + esc(c.name) + 's gympa</span>';
  }
  legend += '</div>';

  document.getElementById('view-kal').innerHTML =
    '<div class="card">' +
    '<div class="cal-head">' +
    '<div class="title">' + MONTHS[m] + ' ' + y + '</div>' +
    '<div class="cal-nav">' +
    '<button class="btn small subtle" onclick="App.calShift(-1)">‹</button>' +
    '<button class="btn small subtle" onclick="App.calGoToday()">Idag</button>' +
    '<button class="btn small subtle" onclick="App.calShift(1)">›</button>' +
    '</div></div>' +
    grid + legend +
    '<p class="small muted" style="margin-bottom:0">Tryck på en <b>dag</b> för detaljer och för att markera att du har barnen. ' +
    'Tryck på ett <b>veckonummer</b> för att markera hela veckan på en gång.</p>' +
    '</div>';
}

/* ---- Mat ---- */
function renderMat(){
  const t = todayDate();
  let html = '';

  /* Kommande middagar */
  let rows = '';
  for(let i = 0; i < 7; i++){
    const d = addDays(t, i);
    const ds = fmtDate(d);
    const meal = state.mealPlan[ds];
    rows += '<div class="plan-row">' +
      '<span class="d">' + (i === 0 ? 'Idag' : cap(WDAYS_SHORT[wIdx(d)])) + '<span class="sub">' + d.getDate() + ' ' + MONTHS[d.getMonth()].slice(0,3) + '</span></span>' +
      '<span class="heart">' + (hasKids(ds) ? '💛' : '<span class="muted">–</span>') + '</span>' +
      '<span class="what">' + (meal ? meal.emoji + ' ' + esc(meal.name) : '<span class="muted">Ingen middag vald</span>') + '</span>' +
      '<button class="btn small subtle" onclick="App.openDay(\'' + ds + '\')">' + (meal ? 'Ändra' : 'Välj') + '</button>' +
      '</div>';
  }
  html += '<div class="card"><h2>📅 Veckans middagar <span class="sub">(7 dagar framåt · 💛 = barnen hos dig)</span></h2>' + rows + '</div>';

  /* Inköpslista */
  const items = state.shopping;
  const doneCount = items.filter(i => i.done).length;
  html += '<div class="card"><h2>🛒 Inköpslistan <span class="sub">(' + (items.length - doneCount) + ' kvar)</span></h2>';
  if(items.length){
    html += items.map(i =>
      '<label class="task ' + (i.done ? 'done' : '') + '">' +
      '<input type="checkbox" ' + (i.done ? 'checked' : '') + ' onchange="App.shopToggle(\'' + i.id + '\')">' +
      '<span class="txt">' + esc(i.text) + '</span>' +
      '<button class="x" title="Ta bort" onclick="App.shopRemove(\'' + i.id + '\')">✕</button></label>'
    ).join('');
  } else {
    html += '<p class="empty">Listan är tom. Lägg till varor nedan eller tryck 🛒 på ett matförslag.</p>';
  }
  html += '<div class="inline-form"><input type="text" id="shopInput" placeholder="Lägg till vara…" onkeydown="if(event.key===\'Enter\')App.shopAdd()">' +
    '<button class="btn small" onclick="App.shopAdd()">Lägg till</button></div>';
  if(doneCount) html += '<button class="btn small subtle" style="margin-top:10px" onclick="App.shopClearDone()">Rensa avklarade (' + doneCount + ')</button>';
  html += '</div>';

  /* Matförslag */
  const mealCard = m =>
    '<div class="sugg">' +
    '<span class="name">' + m.emoji + ' ' + esc(m.name) + '</span>' +
    '<span class="ing">' + m.ing.map(esc).join(', ') + '</span>' +
    (m.adult ? '<span class="adult">🌶️ <b>Vuxenversion:</b> ' + esc(m.adult) + '</span>' : '') +
    '<div class="row">' +
    '<button class="btn small ghost" onclick="App.mealToList(\'' + m.id + '\')">🛒 Till listan</button>' +
    '<button class="btn small" onclick="App.planMeal(\'' + m.id + '\')">📅 Planera</button>' +
    '</div>' +
    (m.id.startsWith('cm') ? '<button class="rm" onclick="App.removeCustomMeal(\'' + m.id + '\')">Ta bort förslag</button>' : '') +
    '</div>';

  html += '<div class="card"><h2>💡 Matförslag <span class="sub">– tryck 🛒 så hamnar ingredienserna i listan</span></h2>' +
    '<div class="sugg-grid">' + allMeals().map(mealCard).join('') + '</div>' +
    '<div style="margin-top:14px; border-top:1px solid var(--line); padding-top:12px">' +
    '<p class="small" style="margin:0 0 8px; font-weight:700">⭐ Lägg till eget förslag</p>' +
    '<input type="text" id="newMealName" placeholder="Maträttens namn" style="margin-bottom:8px">' +
    '<input type="text" id="newMealIng" placeholder="Ingredienser, separera med komma" style="margin-bottom:8px">' +
    '<div class="inline-form" style="margin-top:0"><input type="text" id="newMealAdult" placeholder="🌶️ Vuxenversion, t.ex. chili & vin i såsen (valfritt)">' +
    '<button class="btn small" onclick="App.addCustomMeal()">Spara</button></div>' +
    '</div></div>';

  document.getElementById('view-mat').innerHTML = html;
}

/* ---- Aktiviteter ---- */
function renderAkt(){
  const t = todayDate();
  let html = '';

  /* Planerade aktiviteter framåt */
  const upcoming = [];
  const dates = Object.keys(state.plannedActivities).sort();
  for(const ds of dates){
    if(ds < fmtDate(t)) continue;
    for(const a of state.plannedActivities[ds]) upcoming.push({ ds: ds, a: a });
  }
  html += '<div class="card"><h2>🗓️ Planerade aktiviteter</h2>';
  if(upcoming.length){
    html += upcoming.slice(0, 12).map(u => {
      const d = parseDate(u.ds);
      return '<div class="plan-row">' +
        '<span class="d">' + shortDate(d) + (hasKids(u.ds) ? '<span class="sub">💛 barnen hos dig</span>' : '') + '</span>' +
        '<span class="what">' + u.a.emoji + ' ' + esc(u.a.name) + '</span>' +

/* ================= Koppling till Skrivbordet ================= */
/* Skrivbordet (skrivbordet.vercel.app) ligger på en annan domän, så
   jobbresorna hämtas via dess delnings-API med en kopplingskod som
   skapas under Profil i Skrivbordet. Resorna skrivs in i samma lokala
   lagring (SHARED_EVENTS_KEY) som kalendern redan läser 🧳 från. */
const SKRIVBORDET_API = 'https://skrivbordet.vercel.app/api/delat';
const KOPPLING_KEY = 'vardagskoll-kopplingskod';
let kopplingStatus = '';
let kopplingLastSync = 0;

async function syncSkrivbordet(force){
  const kod = localStorage.getItem(KOPPLING_KEY);
  if(!kod) return;
  /* håll nere trafiken: högst var 5:e minut, utom vid uttrycklig begäran */
  const now = Date.now();
  if(!force && now - kopplingLastSync < 5 * 60 * 1000) return;
  kopplingLastSync = now;

  try{
    const res = await fetch(SKRIVBORDET_API + '?kod=' + encodeURIComponent(kod));
    if(res.status === 404){
      kopplingStatus = '⚠️ Koden känns inte igen längre – kontrollera den under Profil i Skrivbordet.';
      if(App.tab === 'mer') renderMer();
      return;
    }
    if(!res.ok) throw new Error('http ' + res.status);
    const data = await res.json();
    const resor = Array.isArray(data.resor) ? data.resor : [];

    /* bygg om dag-för-dag-kartan från reselistan */
    const events = {};
    for(const r of resor){
      if(!r.start) continue;
      let d = parseDate(r.start);
      const end = parseDate(r.end || r.start);
      let guard = 0;
      while(d <= end && guard++ < 400){
        const ds = fmtDate(d);
        (events[ds] = events[ds] || []).push({ type: 'jobbresa', label: r.label || 'Jobbresa', source: 'skrivbordet' });
        d = addDays(d, 1);
      }
    }

    const before = localStorage.getItem(SHARED_EVENTS_KEY) || '';
    const after = JSON.stringify(events);
    localStorage.setItem(SHARED_EVENTS_KEY, after);
    kopplingStatus = '✅ Kopplad – ' + (resor.length ? resor.length + (resor.length === 1 ? ' resa hämtad' : ' resor hämtade') : 'inga resor inlagda ännu') + '.';
    if(after !== before) renderAll();
    else if(App.tab === 'mer') renderMer();
  }catch(e){
    /* nätverksfel: behåll senast hämtade resorna, försök igen senare */
    kopplingStatus = '⚠️ Kunde inte nå Skrivbordet just nu – visar senast hämtade resorna.';
    if(App.tab === 'mer') renderMer();
  }
}

/* ================= Koppling till Assistenten ================= */
/* Assistenten behöver känna till barnens schema för att kunna skriva
   morgonbriefen. Med assistentkoden (skapas under Profil i Skrivbordet)
   skickas ett litet urval upp: barnens namn och gympadagar, vilka dagar
   barnen är hos dig, matplanen, aktiviteter och städschemat. Inget
   hämtas hit den här vägen. */
const ASSISTENT_API = 'https://skrivbordet.vercel.app/api/assistent';
const ASSISTENT_KEY = 'assistent-kopplingskod';
let assistentStatus = '';
let assistentSenast = '';   /* JSON för senast uppskickade datat */
let assistentTimer = null;
let assistentLastTry = 0;

function assistentPayload(){
  const fran = fmtDate(addDays(todayDate(), -7));
  const dagar = {};
  for(const ds of Object.keys(state.custody)) if(ds >= fran) dagar[ds] = true;
  const middagar = {};
  for(const ds of Object.keys(state.mealPlan)) if(ds >= fran) middagar[ds] = state.mealPlan[ds];
  const aktiviteter = {};
  for(const ds of Object.keys(state.plannedActivities)) if(ds >= fran) aktiviteter[ds] = state.plannedActivities[ds];
  return {
    barn: state.children.map(c => ({ namn: c.name, gympa: c.gympa || [] })),
    barnDagar: dagar,
    middagar: middagar,
    aktiviteter: aktiviteter,
    stad: state.cleaningTasks.map(t => ({ namn: t.name, dag: t.day })),
    inkopKvar: state.shopping.filter(s => !s.done).length
  };
}

/* körs efter varje save() — samlar ihop tätt följande ändringar */
function scheduleAssistentSync(){
  if(!localStorage.getItem(ASSISTENT_KEY)) return;
  clearTimeout(assistentTimer);
  assistentTimer = setTimeout(() => syncAssistentUpp(), 4000);
}

async function syncAssistentUpp(force){
  const kod = localStorage.getItem(ASSISTENT_KEY);
  if(!kod) return;
  const payload = assistentPayload();
  const json = JSON.stringify(payload);
  const now = Date.now();
  if(!force && json === assistentSenast) return;               /* inget nytt */
  if(!force && now - assistentLastTry < 60 * 1000){ scheduleAssistentSync(); return; }
  assistentLastTry = now;

  try{
    /* tidsstämpeln läggs på efter jämförelsen, annars ser datat alltid "nytt" ut */
    payload.uppdaterad = new Date().toISOString();
    const res = await fetch(ASSISTENT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kod: kod, skriv: { 'assistent-vardagskoll': payload } })
    });
    if(res.status === 404 || res.status === 400){
      assistentStatus = '⚠️ Assistentkoden känns inte igen – kontrollera den under Profil i Skrivbordet.';
      if(App.tab === 'mer') renderMer();
      return;
    }
    if(!res.ok) throw new Error('http ' + res.status);
    assistentSenast = json;
    assistentStatus = '✅ Kopplad – schemat skickades ' + new Date().toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' }) + '.';
    if(App.tab === 'mer') renderMer();
  }catch(e){
    /* nätverksfel: försök igen vid nästa ändring eller intervall */
    assistentStatus = '⚠️ Kunde inte nå assistenten just nu – försöker igen senare.';
    if(App.tab === 'mer') renderMer();
  }
}

/* ================= Notiser ================= */
function checkNotifications(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const ts = fmtDate(todayDate());
  let changed = false;
  for(const r of gympaReminders(state.children)){
    if(r.off === 0) continue; /* notis skickas 1 och 2 dagar innan */
    const key = 'g-' + r.child.id + '-' + fmtDate(r.date) + '-' + r.off;
    if(state.notified[key]) continue;
    fireNotification('Vardagskoll – gympapåminnelse', reminderText(r), key);
    state.notified[key] = ts;
    changed = true;
  }
  /* städa gamla nycklar */
  const limit = fmtDate(addDays(todayDate(), -14));
  for(const k of Object.keys(state.notified)){
    if(state.notified[k] < limit){ delete state.notified[k]; changed = true; }
  }
  if(changed){ save(); syncReminderDataToIDB(); }
}
function fireNotification(title, body, tag){
  const opts = { body: body, icon: 'icon-192.png', badge: 'icon-192.png', tag: tag };
  if(navigator.serviceWorker && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg => reg.showNotification(title, opts)).catch(() => {
      try{ new Notification(title, opts); }catch(e){}
    });
  } else {
    try{ new Notification(title, opts); }catch(e){}
  }
}

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      /* Bästa-möjliga-försök: be om periodisk bakgrundskörning (bara Chrome/Edge på Android, installerad app). */
      if('periodicSync' in reg && navigator.permissions){
        navigator.permissions.query({ name: 'periodic-background-sync' }).then(status => {
          if(status.state === 'granted'){
            reg.periodicSync.register('gympa-check', { minInterval: 12 * 60 * 60 * 1000 }).catch(() => {});
          }
        }).catch(() => {});
      }
      if('sync' in reg){ reg.sync.register('gympa-check').catch(() => {}); }
    }).catch(() => { /* offline/installerbart stöd saknas – appen funkar ändå i webbläsaren */ });
  });
}

/* Uppdatera direkt om Skrivbordet (öppet i en annan flik, samma origin)
   lägger till/ändrar en jobbresa medan Vardagskoll är öppen. */
window.addEventListener('storage', e => {
  if(e.key === SHARED_EVENTS_KEY) renderAll();
});

/* ================= Start ================= */
load();
syncReminderDataToIDB();
App.go('idag');
checkNotifications();
loadElpriser();
syncSkrivbordet(true);
syncAssistentUpp();

let lastDay = fmtDate(todayDate());
setInterval(() => {
  const now = fmtDate(todayDate());
  if(now !== lastDay){ lastDay = now; renderAll(); }
  checkNotifications();
  loadElpriser();
  syncSkrivbordet();
  syncAssistentUpp();
}, 60000);

/* hämta färska resor när appen kommer tillbaka i förgrunden (t.ex. på mobilen) */
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') syncSkrivbordet(true);
});
</script>
</body>
